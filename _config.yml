# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
title: Laura Mosher // Senior Software Engineer // Full-Stack Developer
email: laura@lauramosher.com
description: > # this means to ignore newlines until "baseurl:"
  Laura is a full-stack senior software engineer with a passion for clean code and oxford commas.
baseurl: "" # the subpath of your site, e.g. /blog
url: "http://lauramosher.com" # the base hostname & protocol for your site, e.g. http://example.com
twitter:
  username: LauraTrev
social:
  name: Laura Mosher
  links:
    - https://twitter.com/LauraTrev
    - https://linkedin.com/in/LauraMosher
    - https://github.com/lauramosher

# Build settings
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-paginate-v2

markdown: kramdown

# Exclude from processing.
# The following items will not be processed, by default. Create a custom list
# to override the default setting.
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/

pagination:
  enabled: true
  debug: false
  per_page: 10
  permalink: '/page/:num/'
  sort_field: 'date'
  sort_reverse: true

autopages:

  # Site-wide kill switch, disable here and it doesn't run at all 
  enabled: true

  # Category pages, omit entire config element to disable
  categories:
    # Optional, the list of layouts that should be processed for every category found in the site
    layouts:
      - 'autopage_category.html'
    # Optional, the title that each category paginate page should get (:cat is replaced by the Category name)
    title: 'Blog // :cat'
    # Optional, the permalink for the  pagination page (:cat is replaced), 
    # the pagination permalink path is then appended to this permalink structure
    permalink: '/blog/category/:cat'

  # Collection pages, omit to disable
  collections:
    layouts:
      - 'autopage_collection.html'
    title: 'Blog // Collection :coll' # :coll is replaced by the collection name
    permalink: '/blog/collection/:coll'

  # Tag pages, omit to disable
  tags:
    layouts:
      - 'autopage_tags.html'
    title: 'Blog // Tag :tag' # :tag is replaced by the tag name
    permalink: '/blog/tag/:tag'
