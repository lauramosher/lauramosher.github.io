<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">

  {% include head.html %}

  <body>
    <main class="page-content" aria-label="Content">

      {% include header.html %}

      <div class="wrapper">
        {{ content }}
      </div>

      <footer>
        <section>
          <h3>Connect</h3>
          <p class="rss-subscribe">Subscribe <a href="{{ "/feed.xml" | relative_url }}">via RSS</a></p>
          <a href="https://linkedin.com/in/lauramosher"><img src="{{ site.url }}/images/icons/Linkedin.svg" width=32 /></a>
          <a href="https://github.com/lauramosher"><img src="{{ site.url }}/images/icons/Github.svg" width=32 /></a>
          <a href="https://twitter.com/lauratrev"><img src="{{ site.url }}/images/icons/Twitter.svg" width=32 /></a>
        </section>

        <section class="recent">
          <h3>Recent Posts</h3>
          <ul>
            {% for post in site.posts limit: 3 %}
              <li>
                {% assign date_format = "%b %d, %Y" %}
                <span class="post-meta">{{ post.date | date: date_format }}</span>

                <a class="post-link" href="{{ post.url | relative_url }}">{{ post.title | escape }}</a>
              </li>
            {% endfor %}
          </ul>
        </section>
      </footer>
    </main>
  </body>
</html>
